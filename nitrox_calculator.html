<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="充填計算">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<title>氣瓶充填計算機</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f2f2f7;
    color: #1c1c1e;
    min-height: 100vh;
    padding-bottom: 2rem;
  }
  header {
    background: #fff;
    border-bottom: 0.5px solid #d1d1d6;
    padding: 1rem 1.25rem 0.75rem;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 {
    font-size: 20px;
    font-weight: 600;
  }
  header p {
    font-size: 13px;
    color: #8e8e93;
    margin-top: 2px;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 1rem;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 0.75rem;
  }
  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: #8e8e93;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 1rem;
  }
  .grid2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  label {
    font-size: 14px;
    color: #3c3c43;
    display: block;
    margin-bottom: 6px;
  }
  input[type=number] {
    width: 100%;
    font-size: 20px;
    font-weight: 500;
    padding: 10px 12px;
    border: 1.5px solid #d1d1d6;
    border-radius: 10px;
    background: #f9f9fb;
    color: #1c1c1e;
    appearance: none;
    -webkit-appearance: none;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type=number]:focus {
    border-color: #007aff;
    background: #fff;
  }
  .unit {
    font-size: 13px;
    color: #8e8e93;
    margin-top: 4px;
  }
  button {
    width: 100%;
    padding: 14px;
    font-size: 17px;
    font-weight: 600;
    background: #007aff;
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin-bottom: 0.75rem;
    -webkit-tap-highlight-color: transparent;
  }
  button:active {
    background: #0062cc;
    transform: scale(0.98);
  }
  .result-card {
    background: #fff;
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 0.75rem;
    display: none;
  }
  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1rem;
  }
  .stat {
    border-radius: 10px;
    padding: 1rem;
    text-align: center;
  }
  .stat.o2 { background: #e8f0ff; }
  .stat.air { background: #e8f8ee; }
  .stat-label {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .stat.o2 .stat-label { color: #1a56c4; }
  .stat.air .stat-label { color: #1a7a3c; }
  .stat-value {
    font-size: 32px;
    font-weight: 700;
    line-height: 1.1;
  }
  .stat.o2 .stat-value { color: #1a56c4; }
  .stat.air .stat-value { color: #1a7a3c; }
  .stat-unit {
    font-size: 13px;
    margin-top: 2px;
  }
  .stat.o2 .stat-unit { color: #1a56c4; }
  .stat.air .stat-unit { color: #1a7a3c; }
  .summary {
    background: #f2f2f7;
    border-radius: 10px;
    padding: 0.875rem 1rem;
    font-size: 14px;
    line-height: 1.7;
    color: #3c3c43;
  }
  .summary strong { color: #1c1c1e; }
  .step-num {
    display: inline-block;
    width: 20px;
    height: 20px;
    background: #1c1c1e;
    color: #fff;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    line-height: 20px;
    margin-right: 4px;
    vertical-align: middle;
  }
  .error-card {
    background: #fff2f2;
    border: 1.5px solid #ffb3b3;
    border-radius: 12px;
    padding: 1rem 1.25rem;
    font-size: 14px;
    color: #c0392b;
    line-height: 1.6;
    display: none;
    margin-bottom: 0.75rem;
  }
  .warning-badge {
    display: inline-block;
    background: #fff3cd;
    color: #856404;
    border-radius: 6px;
    font-size: 12px;
    padding: 2px 8px;
    margin-bottom: 0.5rem;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1c1c1e; color: #f2f2f7; }
    header { background: #2c2c2e; border-color: #3a3a3c; }
    .card, .result-card { background: #2c2c2e; }
    input[type=number] { background: #3a3a3c; border-color: #48484a; color: #f2f2f7; }
    input[type=number]:focus { border-color: #0a84ff; background: #2c2c2e; }
    label { color: #ebebf0; }
    .summary { background: #3a3a3c; color: #ebebf0; }
    .summary strong { color: #f2f2f7; }
    .stat.o2 { background: #1c2d50; }
    .stat.air { background: #1a3026; }
    .stat.o2 .stat-label, .stat.o2 .stat-value, .stat.o2 .stat-unit { color: #5e9bff; }
    .stat.air .stat-label, .stat.air .stat-value, .stat.air .stat-unit { color: #3dba6f; }
    button { background: #0a84ff; }
    button:active { background: #0070d8; }
    .error-card { background: #3a1a1a; border-color: #8b2020; color: #ff6b6b; }
    .step-num { background: #f2f2f7; color: #1c1c1e; }
    .warning-badge { background: #3a2f00; color: #ffd60a; }
  }
</style>
</head>
<body>

<header>
  <h1>氣瓶充填計算機</h1>
  <p>Nitrox 分壓混合充填</p>
</header>

<div class="container">

  <div class="card">
    <p class="card-title">目標設定</p>
    <div class="grid2">
      <div>
        <label for="p_target">目標壓力</label>
        <input type="number" id="p_target" value="200" min="1" step="1" inputmode="decimal">
        <p class="unit">bar</p>
      </div>
      <div>
        <label for="fo2_target">目標氧氣濃度</label>
        <input type="number" id="fo2_target" value="32" min="21" max="100" step="0.1" inputmode="decimal">
        <p class="unit">%</p>
      </div>
    </div>
  </div>

  <div class="card">
    <p class="card-title">目前狀態</p>
    <div class="grid2">
      <div>
        <label for="p_current">目前壓力</label>
        <input type="number" id="p_current" value="50" min="0" step="1" inputmode="decimal">
        <p class="unit">bar</p>
      </div>
      <div>
        <label for="fo2_current">目前氧氣濃度</label>
        <input type="number" id="fo2_current" value="21" min="0" max="100" step="0.1" inputmode="decimal">
        <p class="unit">%</p>
      </div>
    </div>
  </div>

  <button onclick="calculate()">計算充填量</button>

  <div class="error-card" id="error-card"></div>

  <div class="result-card" id="result-card">
    <p class="card-title">充填步驟</p>
    <div class="result-grid">
      <div class="stat o2">
        <p class="stat-label">① 先充氧氣</p>
        <p class="stat-value" id="o2_bar">—</p>
        <p class="stat-unit">bar</p>
      </div>
      <div class="stat air">
        <p class="stat-label">② 再充空氣</p>
        <p class="stat-value" id="air_bar">—</p>
        <p class="stat-unit">bar</p>
      </div>
    </div>
    <div class="summary" id="summary"></div>
  </div>

</div>

<script>
function calculate() {
  var pt    = parseFloat(document.getElementById('p_target').value);
  var fo2t  = parseFloat(document.getElementById('fo2_target').value) / 100;
  var pc    = parseFloat(document.getElementById('p_current').value);
  var fo2c  = parseFloat(document.getElementById('fo2_current').value) / 100;

  var errCard    = document.getElementById('error-card');
  var resultCard = document.getElementById('result-card');

  function showErr(msg) {
    errCard.textContent = msg;
    errCard.style.display = 'block';
    resultCard.style.display = 'none';
  }

  errCard.style.display = 'none';
  resultCard.style.display = 'none';

  if (isNaN(pt) || isNaN(fo2t) || isNaN(pc) || isNaN(fo2c)) {
    showErr('⚠ 請填寫所有欄位。'); return;
  }
  if (pt <= 0) { showErr('⚠ 目標壓力必須大於 0 bar。'); return; }
  if (pc < 0)  { showErr('⚠ 目前壓力不能為負數。'); return; }
  if (fo2t < 0.21 || fo2t > 1) { showErr('⚠ 目標氧氣濃度需在 21%–100% 之間。'); return; }
  if (fo2c < 0 || fo2c > 1)    { showErr('⚠ 目前氧氣濃度需在 0%–100% 之間。'); return; }
  if (pc >= pt) { showErr('⚠ 目前壓力已達到或超過目標壓力，無需充填。'); return; }

  var AIR_O2 = 0.2095;
  var p_o2  = (pt * (fo2t - AIR_O2) - pc * (fo2c - AIR_O2)) / (1 - AIR_O2);
  var p_air = pt - pc - p_o2;

  if (p_o2 < -0.1) {
    showErr('⚠ 無法達成目標：目前氧氣濃度已超過目標濃度。\n建議先排放部分氣體後，再重新充填。'); return;
  }
  if (p_air < -0.1) {
    showErr('⚠ 無法達成目標：所需氧氣量超過剩餘空間。\n請調低目標氧氣濃度，或先排放部分氣體。'); return;
  }

  p_o2  = Math.max(0, p_o2);
  p_air = Math.max(0, p_air);

  var after_o2   = (pc + p_o2).toFixed(1);
  var finalFo2   = ((pc * fo2c + p_o2 * 1.0 + p_air * AIR_O2) / pt * 100).toFixed(1);

  document.getElementById('o2_bar').textContent  = p_o2.toFixed(1);
  document.getElementById('air_bar').textContent = p_air.toFixed(1);

  document.getElementById('summary').innerHTML =
    '目前：<strong>' + pc + ' bar</strong>，氧氣 <strong>' + (fo2c*100).toFixed(1) + '%</strong><br>' +
    '<span class="step-num">1</span> 充入純氧 <strong>' + p_o2.toFixed(1) + ' bar</strong>（→ ' + after_o2 + ' bar）<br>' +
    '<span class="step-num">2</span> 充入空氣 <strong>' + p_air.toFixed(1) + ' bar</strong>（→ ' + pt + ' bar）<br>' +
    '預估最終氧氣濃度：<strong>' + finalFo2 + '%</strong>';

  resultCard.style.display = 'block';
  resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') calculate();
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
